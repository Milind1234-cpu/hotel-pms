<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Hotel PMS - Secure Login</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Inter -->

<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">

                        "on-tertiary-fixed": "#0e1c30",

                        "tertiary-fixed": "#d6e3ff",
                        "tertiary": "#47546b",
                        "inverse-surface": "#2d3133",
                        "inverse-primary": "#b5c4ff",
                        "on-background": "#191c1e",
                        "primary": "#0048c6",
                        "on-secondary-container": "#fffbff",
                        "surface-dim": "#d8dadc",
                        "outline": "#737687",
                        "primary-container": "#0f5ef7",
                        "surface-variant": "#e0e3e5",

                        "tertiary-container": "#5f6c84",
                        "outline-variant": "#c3c5d8",

                        "primary-fixed-dim": "#b5c4ff",

                        "secondary": "#0d4edc",
                        "surface-container-highest": "#e0e3e5",
                        "on-error-container": "#93000a",
                        "inverse-on-surface": "#eff1f3",
                        "on-secondary-fixed": "#00164f",
                        "on-secondary-fixed-variant": "#003bb0",
                        "on-tertiary-fixed-variant": "#3a475d",
                        "on-error": "#ffffff",
                        "surface-tint": "#0052de",
                        "surface-bright": "#f7f9fb",
                        "tertiary-fixed-dim": "#bac7e2",
                        "surface-container-low": "#f2f4f6",
                        "background": "#f7f9fb",
                        "surface-container-high": "#e6e8ea",
                        "on-primary-fixed": "#00174c",
                        "secondary-container": "#3869f6",
                        "on-tertiary": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "4px",
                        "margin": "32px",
                        "lg": "24px",
                        "gutter": "24px",
                        "xl": "32px",
                        "base": "4px",
                        "md": "16px",
                        "2xl": "48px",

                    },
                    "fontFamily": {
                        "body-sm": ["Inter"],
                        "label-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "display-lg": ["Inter"],

                    },
                    "fontSize": {

                        "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],

                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],

                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.25);
        }

        .animated-bg {
            background: #071529; /* Navy primary */
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            overflow: hidden;
        }

        .glow-element {
            position: absolute;
            width: 800px;
            height: 800px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(15, 94, 247, 0.12) 0%, rgba(15, 94, 247, 0) 70%);
            filter: blur(80px);
            pointer-events: none;
            animation: float 25s infinite alternate ease-in-out;
        }

        @keyframes float {
            0% { transform: translate(-15%, -15%) scale(1); }
            100% { transform: translate(15%, 15%) scale(1.15); }
        }

        .input-glow:focus-within {
            border-color: #0F5EF7;
            box-shadow: 0 0 0 4px rgba(15, 94, 247, 0.08);
        }

        .primary-gradient-btn {
            background: #0F5EF7; /* Solid brand primary */
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .primary-gradient-btn:hover {
            background: #0A4DDB;
            transform: translateY(-2px);
            box-shadow: 0 12px 24px -8px rgba(15, 94, 247, 0.5);
        }

        .primary-gradient-btn:active {
            transform: translateY(0);
        }

        .custom-tracking-tight {
            letter-spacing: -0.03em;
        }

        .custom-tracking-wide {
            letter-spacing: 0.08em;
        }
    </style>
</head>
<body class="font-body-md text-on-surface bg-background min-h-screen flex items-center justify-center p-md">
<!-- Atmospheric Background Layers -->
<div class="animated-bg">
<div class="glow-element" style="top: -20%; left: -10%;"></div>
<div class="glow-element" style="bottom: -20%; right: -10%; animation-delay: -7s;"></div>
<div class="glow-element" style="top: 30%; right: 15%; animation-delay: -12s; width: 500px; height: 500px;"></div>
</div>
<!-- Main Content Container -->
<div class="w-full max-w-xl flex flex-col items-center">
<!-- Brand Identity Section -->
<div class="mb-2xl text-center flex flex-col items-center">
<!-- Removed the user avatar/logo image as requested, using a minimalist icon or text-only branding -->
<div class="mb-md">
<span class="material-symbols-outlined text-primary-fixed text-5xl opacity-80">apartment</span>
</div>
<h1 class="font-headline-lg text-4xl text-white mb-sm custom-tracking-tight font-extrabold">Hotel PMS</h1>
<p class="font-body-md text-sm text-primary-fixed-dim/60 custom-tracking-wide uppercase font-semibold">Professional Property Management</p>
</div>
<!-- Login Card -->
<main class="glass-card w-full p-2xl md:p-[72px] rounded-[32px] transition-all duration-500 ease-out">
<header class="mb-2xl">
<h2 class="text-[32px] leading-tight font-bold text-on-surface mb-md custom-tracking-tight">Welcome back</h2>
<p class="font-body-md text-on-surface-variant/70">Securely sign in to your dashboard to manage your properties and reservations.</p>
</header>
<form class="space-y-xl" id="login-form" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="space-y-md">
<label class="font-label-md text-xs font-bold text-on-surface-variant/80 block uppercase custom-tracking-wide" for="email">Email Address</label>
<div class="relative flex items-center group input-glow rounded-2xl transition-all border border-outline-variant/30 bg-white">
<span class="material-symbols-outlined absolute left-md text-outline group-focus-within:text-primary transition-colors text-xl">mail</span>
<input class="w-full pl-12 pr-md py-4 bg-transparent border-none focus:ring-0 rounded-2xl font-body-md text-on-surface placeholder:text-outline-variant/50" id="email" name="email" placeholder="milind@hotel.com" required="" type="email">
</div>
</div>
<!-- Password Field -->
<div class="space-y-md">
<div class="flex justify-between items-center">
<label class="font-label-md text-xs font-bold text-on-surface-variant/80 block uppercase custom-tracking-wide" for="password">Password</label>
<a class="font-label-md text-sm font-semibold text-primary hover:text-secondary transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative flex items-center group input-glow rounded-2xl transition-all border border-outline-variant/30 bg-white">
<span class="material-symbols-outlined absolute left-md text-outline group-focus-within:text-primary transition-colors text-xl">lock</span>
<input class="w-full pl-12 pr-12 py-4 bg-transparent border-none focus:ring-0 rounded-2xl font-body-md text-on-surface placeholder:text-outline-variant/50" id="password" name="password" placeholder="••••••••" required="" type="password">
<button class="absolute right-md text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" id="toggle-password">visibility</span>
</button>
</div>
</div>
<!-- Remember Me & Additional Options Row -->
<div class="flex items-center justify-between pt-base">
<label class="flex items-center space-x-3 cursor-pointer group select-none">
<div class="relative flex items-center">
<input class="w-6 h-6 rounded-lg border-outline-variant/40 text-primary focus:ring-primary/20 transition-all cursor-pointer" id="remember" type="checkbox">
</div>
<span class="font-body-sm text-on-surface-variant group-hover:text-on-surface transition-colors">Remember this device</span>
</label>
</div>
<!-- Submit Button -->
<div class="pt-md">
<button class="primary-gradient-btn w-full py-5 px-lg rounded-2xl text-white font-bold text-lg flex items-center justify-center gap-md group" type="submit">
<span>Sign In to Dashboard</span>
<span class="material-symbols-outlined transition-transform group-hover:translate-x-1">arrow_forward</span>
</button>
</div>
</form>
<footer class="mt-2xl pt-2xl border-t border-outline-variant/10 flex flex-col items-center gap-md">
<p class="font-body-sm text-on-surface-variant/60">New to Hotel PMS?</p>
<a class="font-label-md text-sm font-bold text-primary py-3 px-xl rounded-xl border border-primary/10 bg-primary/5 hover:bg-primary/10 transition-all" href="#">
                    Register your Property
                </a>
</footer>
</main>
<!-- Footer Help Links -->
<nav class="mt-2xl flex gap-xl text-white/30 font-label-md text-sm">
<a class="hover:text-white transition-colors" href="#">Help Center</a>
<a class="hover:text-white transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-white transition-colors" href="#">Terms of Service</a>
</nav>
</div>
<script>
        // Password toggle logic
        const togglePassword = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePassword.textContent = type === 'password' ? 'visibility' : 'visibility_off';
        });

        // Simple form interaction
        const form = document.getElementById('login-form');
        form.addEventListener('submit', (e) => {
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> Processing...';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.disabled = false;
                alert('Sign in attempted with: ' + document.getElementById('email').value);
            }, 1500);
        });

        // Refined mouse parallax for background depth
        document.addEventListener('mousemove', (e) => {
            const glows = document.querySelectorAll('.glow-element');
            const mouseX = (e.clientX / window.innerWidth) - 0.5;
            const mouseY = (e.clientY / window.innerHeight) - 0.5;

            glows.forEach((glow, index) => {
                const intensity = (index + 1) * 30;
                const x = mouseX * intensity;
                const y = mouseY * intensity;
                glow.style.transform = `translate(${x}px, ${y}px)`;
            });
        });
    </script>
</body></html>
